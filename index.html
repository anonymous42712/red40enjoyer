<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Soundboard</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600&family=Orbitron:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    h2 {
      font-weight: 600;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #fff;
      margin-bottom: 30px;
      text-align: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 15px;
      width: 100%;
      max-width: 800px;
    }

    button {
      font-family: 'Orbitron', sans-serif;
      background: #000;
      border: 1px solid #fff;
      color: #fff;
      padding: 16px;
      font-size: 12px;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: 0.2s ease;
      text-shadow: 0 0 6px #fff;
      font-weight: 500;
      border-radius: 8px;
      min-height: 55px;
      line-height: 1.2;
      word-break: break-word;
      white-space: normal;
      overflow: visible;
    }

    button:hover {
      background: #111;
      box-shadow: 0 0 20px #fff;
    }

    button:active {
      transform: scale(0.95);
    }

    footer {
      margin-top: 40px;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
      color: #aaa;
      text-shadow: 0 0 4px #fff;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      button {
        padding: 14px;
        font-size: 11px;
        min-height: 50px;
      }
    }
  </style>
</head>

<body>

<h2>SOUNDBOARD</h2>

<div class="board">
  <button onclick="play('sounds/Chinese.mp3')">CHINESE</button>
  <button onclick="play('sounds/VineBoom0.mp3')">VINE BOOM</button>
  <button onclick="play('sounds/FahhhhHD.mp3')">FAHHHH</button>
  <button onclick="play('sounds/Knocking.mp3')">KNOCKING</button>
  <button onclick="play('sounds/GooGooGaga.mp3')">GOO GOO GAGA</button>
  <button onclick="play('sounds/TungTungSahur.mp3')">TUNG TUNG SAHUR</button>
  <button onclick="play('sounds/Kirk.mp3')">KIRK</button>
  <button onclick="play('sounds/RipMyGranny.mp3')">RIP MY GRANNY</button>
  <button onclick="play('sounds/Fart.mp3')">FART</button>
  <button onclick="play('sounds/ApplePay.mp3')">APPLE PAY</button>
  <button onclick="play('sounds/IncorrectBuzzer.mp3')">INCORRECT BUZZER</button>
  <button onclick="play('sounds/ShutUpMom.mp3')">SHUT UP MOM</button>
  <button onclick="play('sounds/Snore.mp3')">SNORE</button>
  <button onclick="play('sounds/Meow.mp3')">MEOW</button>
  <button onclick="play('sounds/Pluh.mp3')">PLUH</button>
</div>

<footer>
  For support contact <a href="mailto:red40sitesupport@gmail.com">red40sitesupport@gmail.com</a>
</footer>

<script>
  // Animated tab title
  const titles = [" We love Red 40", " Play Sounds!", " Geekin", " Have Fun!"];
  let index = 0;
  setInterval(() => {
    document.title = titles[index];
    index = (index + 1) % titles.length;
  }, 1000);

  // Cooldown logic (4 seconds)
  let canPlay = true;
  function play(file) {
    if (!canPlay) return; // ignore clicks during cooldown
    const audio = new Audio(file);
    audio.play().catch(e => console.log("Error playing audio:", e));
    canPlay = false;
    setTimeout(() => {
      canPlay = true;
    }, 4000);
  }
</script>

</body>
</html>
